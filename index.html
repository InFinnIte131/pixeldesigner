<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NNC Pixel Designer</title>

<style>
:root{
  --bg1:#0b0b12;
  --bg2:#141420;
  --panel:#151520;
  --text:#eee;
  --border:#222;
  --accent:#4c7f99;
}

body.light{
  --bg1:#fff7b0;
  --bg2:#ffe066;
  --panel:#fff3a3;
  --text:#2b2b2b;
  --border:#d6b84b;
  --accent:#ffcc00;
}

body{
  margin:0;
  background:linear-gradient(135deg,var(--bg1),var(--bg2));
  color:var(--text);
  font-family:system-ui,sans-serif;
  display:flex;
  height:100vh;
  overflow:hidden;
}

.sidebar{
  width:70px;
  background:rgba(20,20,30,0.95);
  border-right:1px solid var(--border);
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:10px 6px;
  gap:8px;
}

.sidebar .spacer{flex:1;}

.sidebar button{
  width:48px;
  height:48px;
  border-radius:10px;
  background:#1c1c28;
  border:1px solid var(--border);
  color:white;
  cursor:pointer;
}

.sidebar button:hover{transform:scale(1.05);background:#2a2a3a;}
.sidebar button.active{background:var(--accent);}

.main{
  flex:1;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

#picker{
  display:flex;
  gap:6px;
  padding:8px;
  border-bottom:1px solid var(--border);
  align-items:center;
  flex-wrap:wrap;
}

button,input{
  background:var(--panel);
  color:var(--text);
  border:1px solid var(--border);
  padding:6px 8px;
  border-radius:6px;
}

button:hover{background:rgba(255,255,255,0.08);}

#grid{
  flex:1;
  display:grid;
  justify-content:center;
  align-content:center;
}

.cell{
  border:1px solid rgba(255,255,255,0.03);
}

/* PALETTES */
.palettePanel{
  width:240px;
  background:var(--panel);
  border-left:1px solid var(--border);
  display:flex;
  flex-direction:column;
}

.paletteHeader{
  padding:10px;
  font-size:12px;
  border-bottom:1px solid var(--border);
}

#paletteList{
  overflow-y:auto;
  flex:1;
  padding:8px;
}

.paletteGroup{
  margin-bottom:10px;
  padding:6px;
  border:1px solid var(--border);
  border-radius:8px;
}

.paletteTitle{
  font-size:11px;
  opacity:0.7;
  margin-bottom:6px;
}

.paletteColors{display:flex;flex-wrap:wrap;gap:4px;}

.color{
  width:18px;height:18px;border-radius:4px;border:1px solid var(--border);cursor:pointer;
}

.color:hover{transform:scale(1.2);}

/* SETTINGS */
.settingsPanel{
  position:fixed;
  top:60px;
  right:10px;
  width:200px;
  background:var(--panel);
  border:1px solid var(--border);
  padding:10px;
  display:none;
  flex-direction:column;
  gap:10px;
  z-index:999;
}

.settingsBtn{
  margin-top:auto;
}

.brand{
  writing-mode:vertical-rl;
  text-orientation:mixed;
  padding:10px;
  border-left:1px solid var(--border);
}

.brand .title{font-size:16px;letter-spacing:3px;}
.brand .sub{font-size:11px;opacity:0.5;}


/* THEME SYSTEM */
:root{
  --bg1:#0b0b12;
  --bg2:#141420;
  --panel:#1c1c28;
  --text:#eee;
  --border:#222;
}

body.light{
  --bg1:#fff7b0;
  --bg2:#ffe066;
  --panel:#fff3a3;
  --text:#2b2b2b;
  --border:#d6b84b;
}

body{
  background:linear-gradient(135deg,var(--bg1),var(--bg2));
  color:var(--text);
}

.sidebar,
.palettePanel,
.topbar,
#picker{
  background:var(--panel) !important;
  border-color:var(--border) !important;
}

button,select,input{
  background:var(--panel);
  color:var(--text);
  border-color:var(--border);
}

.settingsPanel{
  position:fixed;
  left:80px;
  bottom:20px;
  background:var(--panel);
  border:1px solid var(--border);
  padding:10px;
  border-radius:8px;
  display:none;
  flex-direction:column;
  gap:8px;
  z-index:999;
}

</style>
</head>

<body>

<div class="sidebar">
<button class="tool active" onclick="setTool('draw',this)">✏️</button>
<button class="tool" onclick="setTool('erase',this)">🧽</button>
<button class="tool" onclick="setTool('bucket',this)">🪣</button>
<button class="tool" onclick="setTool('eyedrop',this)">👆</button>

<button onclick="undo()">↩️</button>
<button onclick="redo()">↪️</button>
<button onclick="zoomOut()">-</button>
<button onclick="zoomIn()">+</button>

<div style="flex:1"></div>
<button onclick="toggleSettings()">⚙️</button>
</div>

<div class="main">

<div id="picker">

<!-- Canvas size controls -->
<label>W <input id="cw" type="number" value="16" min="4" max="64"></label>
<label>H <input id="ch" type="number" value="16" min="4" max="64"></label>
<button onclick="applySize()">Apply Size</button>

<!-- Color -->
<input type="color" id="colorPicker" onchange="setColor(this.value)">
R <input id="r" type="number" min="0" max="255" onchange="updateRGB()">
G <input id="g" type="number" min="0" max="255" onchange="updateRGB()">
B <input id="b" type="number" min="0" max="255" onchange="updateRGB()">

<small style="opacity:.6">(Export removed — use screenshot)</small>
</div>

<div id="grid"></div>
</div>

<div class="palettePanel">
<div class="paletteHeader">PALETTES</div>
<div id="paletteList"></div>
</div>

<div class="settingsPanel" id="settings">
<label><input type="radio" name="theme" onclick="setTheme('dark')" checked> Dark Mode</label>
<label><input type="radio" name="theme" onclick="setTheme('light')"> Light Mode</label>
</div>

<div class="settingsPanel" id="settings">
<label>
  <input type="checkbox" onchange="toggleTheme(this)">
  Light Mode
</label>
</div>

<div class="brand">
<div class="title">NNC Pixel Designer</div>
<div class="sub">By InFinnIte</div>
</div>

<script>
const PALETTES = {
Minecraft:["#fff","#d87f33","#b24cd8","#6699d8","#e5e533","#7fcc19","#404040","#8b8b8b"],
Classic:["#000000","#ffffff","#ff0000","#00ff00","#0000ff","#ffff00"],
Grayscale:["#000000","#222222","#555555","#888888","#cccccc","#ffffff"],
Pastel:["#ffd1dc","#b5ead7","#c7ceea","#ffdac1","#e2f0cb"],
Candy:["#ff4fa3","#ff85c2","#ffd1e8","#ffb347"],
Neon:["#ff00ff","#00ffff","#39ff14","#ff073a"],
Cyberpunk:["#0ff","#f0f","#0f0","#111","#ff0"],
Vaporwave:["#ff71ce","#01cdfe","#05ffa1","#b967ff"],
Sunset:["#ff5e62","#ff9966","#ffd166"],
Sunrise:["#ffb347","#ffcc33","#fff176"],
Ocean:["#021b79","#0575e6","#00c6ff"],
Forest:["#0b3d0b","#2e7d32","#66bb6a"],
Earth:["#5d4037","#8d6e63","#a1887f"],
Desert:["#c2b280","#e0c097","#f4d03f"],
Autumn:["#d35400","#e67e22","#f39c12"],
Winter:["#dfe6e9","#b2bec3","#636e72"],
Ice:["#d0f4ff","#a0e9ff","#70d6ff"],
Fire:["#ff0000","#ff4500","#ff8c00"],
Lava:["#8b0000","#ff2400","#ff7f50"],
Toxic:["#39ff14","#a4ff00","#66ff66"],
RetroArcade:["#ff0080","#8000ff","#00ffcc","#ffcc00"],
Gameboy:["#0f380f","#306230","#8bac0f","#9bbc0f"],
Material:["#f44336","#2196f3","#4caf50","#ffeb3b"]
};

let tool="draw",color="#ff0000",w=16,h=16,zoom=1;
let grid=[],history=[],redoStack=[],down=false;

function setTheme(t){document.body.className=t;}
function toggleSettings(){const s=document.getElementById('settings');s.style.display=s.style.display==='flex'?'none':'flex';}

function setTool(t,b){tool=t;document.querySelectorAll('.tool').forEach(x=>x.classList.remove('active'));if(b)b.classList.add('active');}

function applySize(){
  w=parseInt(document.getElementById('cw').value);
  h=parseInt(document.getElementById('ch').value);
  create();
}

function init(){create();renderPalette();sync(color);}

function create(){grid=Array.from({length:h},()=>Array(w).fill('#fff'));render();}

function setColor(c){color=c;document.getElementById('colorPicker').value=c;sync(c);}
function sync(c){r.value=parseInt(c.slice(1,3),16);g.value=parseInt(c.slice(3,5),16);b.value=parseInt(c.slice(5,7),16);}
function updateRGB(){setColor('#'+(+r.value).toString(16).padStart(2,'0')+(+g.value).toString(16).padStart(2,'0')+(+b.value).toString(16).padStart(2,'0'));}

function save(){history.push(JSON.stringify(grid));redoStack=[];}
function undo(){if(history.length){redoStack.push(JSON.stringify(grid));grid=JSON.parse(history.pop());render();}}
function redo(){if(redoStack.length){history.push(JSON.stringify(grid));grid=JSON.parse(redoStack.pop());render();}}

function fill(r,c,t,n){if(t===n)return;let s=[[r,c]];while(s.length){let [x,y]=s.pop();if(x<0||y<0||x>=h||y>=w)continue;if(grid[x][y]!==t)continue;grid[x][y]=n;s.push([x+1,y],[x-1,y],[x,y+1],[x,y-4]);}}

function paint(r,c){if(tool==='eyedrop')return setColor(grid[r][c]);if(tool==='bucket'){save();fill(r,c,grid[r][c],color);return;}grid[r][c]=tool==='erase'?'#fff':color;}

function zoomIn(){zoom+=.2;render();}
function zoomOut(){zoom-=.2;render();}

function render(){const g=document.getElementById('grid');let s=20*zoom;g.style.gridTemplateColumns=`repeat(${w},${s}px)`;g.innerHTML='';for(let r=0;r<h;r++)for(let c=0;c<w;c++){let d=document.createElement('div');d.className='cell';d.style.width=s+'px';d.style.height=s+'px';d.style.background=grid[r][c];d.onmousedown=()=>{save();down=true;paint(r,c);render();};d.onmouseenter=()=>{if(down){paint(r,c);render();}};g.appendChild(d);}}

function renderPalette(){let p=document.getElementById('paletteList');p.innerHTML='';for(let n in PALETTES){let g=document.createElement('div');g.className='paletteGroup';g.innerHTML=`<div class='paletteTitle'>${n}</div>`;let c=document.createElement('div');c.className='paletteColors';PALETTES[n].forEach(x=>{let d=document.createElement('div');d.className='color';d.style.background=x;d.onclick=()=>setColor(x);c.appendChild(d);});g.appendChild(c);p.appendChild(g);}}

document.addEventListener('mouseup',()=>down=false);
init();

function toggleSettings(){
  const s=document.getElementById("settings");
  s.style.display = s.style.display==="flex" ? "none" : "flex";
}

function toggleTheme(el){
  if(el.checked){
    document.body.classList.add("light");
  } else {
    document.body.classList.remove("light");
  }
}
</script>
</body>
</html>
